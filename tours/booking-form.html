<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Sunrise Boat Ride | Ganges Tour</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e6f7ff 0%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .booking-container {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 104, 255, 0.15);
            overflow: hidden;
            border: 1px solid #e1f0ff;
        }
        .header {
            background: linear-gradient(135deg, #1a237e, #4a148c);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .tour-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            margin-top: 15px;
            font-weight: 600;
            border: 2px solid #FFD700;
        }
        .form-container {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a237e;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ff;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8faff;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1a237e;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .required::after {
            content: " *";
            color: #ff4757;
        }
        .submit-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1a237e;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .download-section {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            border: 2px dashed #1a73e8;
        }
        .download-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="booking-container">
        <div class="header">
            <h1>Book Your Tour</h1>
            <p>Fill in your details to reserve your spot</p>
            <div class="tour-badge" id="tourNameDisplay">Sunrise Boat Ride on the Ganges</div>
        </div>
        
        <div class="form-container">
            <div id="message" class="message"></div>
            
            <form id="bookingForm">
                <div class="form-group">
                    <label class="required">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required 
                           placeholder="Enter your full name">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Email Address</label>
                        <input type="email" id="email" name="email" required 
                               placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="required">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" name="whatsapp" required 
                               placeholder="+91 9876543210">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Tour Date</label>
                        <input type="date" id="tourDate" name="tourDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Preferred Time</label>
                        <select id="tourTime" name="tourTime" required>
                            <option value="">Select time</option>
                            <option value="5:00 AM">5:00 AM (Sunrise Slot)</option>
                            <option value="5:30 AM">5:30 AM</option>
                            <option value="6:00 AM">6:00 AM</option>
                            <option value="6:30 AM">6:30 AM</option>
                            <option value="7:00 AM">7:00 AM</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Number of People</label>
                        <select id="peopleCount" name="peopleCount" required>
                            <option value="">Select</option>
                            <option value="1">1 Person</option>
                            <option value="2">2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5">5 People</option>
                            <option value="6">6 People</option>
                            <option value="7">7+ People (Custom)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Special Requirements</label>
                        <input type="text" id="specialReq" name="specialReq" 
                               placeholder="Dietary needs, accessibility, etc.">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Tour Name (Pre-selected)</label>
                    <input type="text" id="tourName" name="tourName" 
                           value="Sunrise Boat Ride on the Ganges" readonly 
                           style="background: #e9ecef; cursor: not-allowed;">
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> Submit Booking Request
                </button>
            </form>
            
            <!-- Download Section -->
            <div class="download-section" id="downloadSection" style="display: none;">
                <p><strong>Booking Saved Successfully!</strong></p>
                <p>A text file with your booking details has been downloaded.</p>
                <button onclick="downloadAllBookings()" class="download-btn">
                    <i class="fas fa-download"></i> Download All Bookings
                </button>
                <button onclick="viewAllBookings()" class="download-btn" style="background: #34a853;">
                    <i class="fas fa-eye"></i> View All Bookings
                </button>
            </div>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Tour Details</a>
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <script>
        // ============ CONFIGURATION ============
        const CONFIG = {
            ADMIN_WHATSAPP: "919565194075", // Your WhatsApp number
            TOUR_NAME: "Sunrise Boat Ride on the Ganges",
            STORAGE_KEY: "ganges_tour_bookings"
        };
        // =======================================

        // Initialize date inputs
        function initializeDates() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('tourDate').min = tomorrow.toISOString().split('T')[0];
            
            const defaultDate = new Date();
            defaultDate.setDate(defaultDate.getDate() + 3);
            document.getElementById('tourDate').value = defaultDate.toISOString().split('T')[0];
        }
        
        // Get tour name from URL
        function getTourFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const tourFromUrl = urlParams.get('tour');
            if (tourFromUrl) {
                const decodedTour = decodeURIComponent(tourFromUrl);
                document.getElementById('tourName').value = decodedTour;
                document.getElementById('tourNameDisplay').textContent = decodedTour;
                return decodedTour;
            }
            return CONFIG.TOUR_NAME;
        }
        
        // Save booking to localStorage
        function saveBookingToStorage(bookingData) {
            try {
                let allBookings = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '[]');
                
                // Add unique ID and timestamp
                bookingData.id = Date.now();
                bookingData.savedAt = new Date().toISOString();
                
                allBookings.push(bookingData);
                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(allBookings));
                
                console.log(`Booking saved to localStorage. Total: ${allBookings.length}`);
                return { success: true, count: allBookings.length };
            } catch (error) {
                console.error("❌ Error saving to localStorage:", error);
                return { success: false, error: error.message };
            }
        }
        
        // Generate text file content
        function generateBookingText(bookingData) {
            const timestamp = new Date().toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                dateStyle: 'full',
                timeStyle: 'medium'
            });
            
            return `========================================
NEW BOOKING RECEIVED - GANGES TOUR
========================================
Booking Time: ${timestamp}
Booking ID: ${bookingData.id}

========================================
GUEST INFORMATION
========================================
Full Name: ${bookingData.fullName}
Email: ${bookingData.email}
WhatsApp: ${bookingData.whatsapp}

========================================
TOUR DETAILS
========================================
Tour Name: ${bookingData.tourName}
Tour Date: ${bookingData.tourDate}
Tour Time: ${bookingData.tourTime}
Number of People: ${bookingData.peopleCount}
Special Requirements: ${bookingData.specialReq || 'None'}

========================================
TECHNICAL INFORMATION
========================================
Page URL: ${bookingData.pageUrl}
Saved At: ${bookingData.savedAt}
========================================

REMINDER: Contact guest within 24 hours!
========================================`;
        }
        
        // Download text file
        function downloadTextFile(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            return true;
        }
        
        // Get IP address (async)
        async function getIPAddress() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }
        
        // Send WhatsApp notification
        function sendWhatsAppNotification(bookingData) {
            const message = `📋 *NEW BOOKING RECEIVED* 📋

👤 *Guest Details:*
• Name: ${bookingData.fullName}
• Email: ${bookingData.email}
• WhatsApp: ${bookingData.whatsapp}

*Tour Details:*
• Tour: ${bookingData.tourName}
• Date: ${bookingData.tourDate}
• Time: ${bookingData.tourTime}
• People: ${bookingData.peopleCount}

*Special Request:* ${bookingData.specialReq || 'None'}

*Booking Time:* ${new Date().toLocaleString()}
*Booking ID:* ${bookingData.id}`;
            
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${CONFIG.ADMIN_WHATSAPP}?text=${encodedMessage}`;
            
            // Open WhatsApp in background
            setTimeout(() => {
                window.open(whatsappUrl, '_blank');
            }, 1000);
        }
        
        // Form submission handler
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const downloadSection = document.getElementById('downloadSection');
            
            // Get form data
            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim(),
                tourDate: document.getElementById('tourDate').value,
                tourTime: document.getElementById('tourTime').value,
                peopleCount: document.getElementById('peopleCount').value,
                specialReq: document.getElementById('specialReq').value.trim(),
                tourName: document.getElementById('tourName').value,
                pageUrl: window.location.href,
                ip: await getIPAddress()
            };
            
            // Validate required fields
            if (!formData.fullName || !formData.email || !formData.whatsapp || 
                !formData.tourDate || !formData.tourTime || !formData.peopleCount) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            try {
                // 1. Save to localStorage
                const saveResult = saveBookingToStorage(formData);
                
                if (!saveResult.success) {
                    throw new Error('Failed to save booking');
                }
                
                // 2. Generate and download text file
                const textContent = generateBookingText(formData);
                const filename = `booking_${formData.fullName.replace(/\s+/g, '_')}_${Date.now()}.txt`;
                downloadTextFile(textContent, filename);
                
                // 3. Show success message
                showMessage(`
                    <i class="fas fa-check-circle"></i>
                    <strong>Booking Submitted Successfully!</strong><br>
                    Your booking has been saved and a confirmation file has been downloaded.
                `, 'success');
                
                // 4. Show download section
                downloadSection.style.display = 'block';
                
                // 5. Send WhatsApp notification
                sendWhatsAppNotification(formData);
                
                // 6. Reset form (keep tour name)
                document.getElementById('bookingForm').reset();
                document.getElementById('tourName').value = formData.tourName;
                initializeDates();
                
                // Scroll to message
                messageDiv.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                showMessage(`
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>Error!</strong><br>
                    ${error.message}
                `, 'error');
            } finally {
                // Re-enable button
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Booking Request';
                }, 2000);
            }
        }
        
        // Show message
        function showMessage(content, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = content;
            messageDiv.style.display = 'block';
        }
        
        // Download all bookings
        function downloadAllBookings() {
            try {
                const allBookings = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '[]');
                
                if (allBookings.length === 0) {
                    alert('No bookings found in storage.');
                    return;
                }
                
                let content = `========================================
ALL BOOKINGS - GANGES TOUR
========================================
Total Bookings: ${allBookings.length}
Generated: ${new Date().toLocaleString()}

`;
                
                allBookings.forEach((booking, index) => {
                    content += `\n\n${'-'.repeat(40)}\n`;
                    content += `BOOKING #${index + 1}\n`;
                    content += `${'-'.repeat(40)}\n`;
                    content += `Name: ${booking.fullName}\n`;
                    content += `Email: ${booking.email}\n`;
                    content += `WhatsApp: ${booking.whatsapp}\n`;
                    content += `Tour: ${booking.tourName}\n`;
                    content += `Date: ${booking.tourDate} | Time: ${booking.tourTime}\n`;
                    content += `People: ${booking.peopleCount}\n`;
                    content += `Special: ${booking.specialReq || 'None'}\n`;
                    content += `Booked: ${new Date(booking.savedAt).toLocaleString()}\n`;
                    content += `Booking ID: ${booking.id}`;
                });
                
                downloadTextFile(content, `all_bookings_${Date.now()}.txt`);
                showMessage('All bookings downloaded successfully!', 'success');
                
            } catch (error) {
                showMessage(`Error downloading bookings: ${error.message}`, 'error');
            }
        }
        
        // View all bookings in console
        function viewAllBookings() {
            try {
                const allBookings = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '[]');
                
                if (allBookings.length === 0) {
                    alert('No bookings found in storage.');
                    return;
                }
                
                console.group('All Bookings in localStorage');
                console.table(allBookings.map(b => ({
                    ID: b.id,
                    Name: b.fullName,
                    WhatsApp: b.whatsapp,
                    Tour: b.tourName,
                    Date: b.tourDate,
                    Time: b.tourTime,
                    People: b.peopleCount
                })));
                console.groupEnd();
                
                alert(`Found ${allBookings.length} bookings. Check browser console for details.`);
                
            } catch (error) {
                console.error('Error viewing bookings:', error);
                alert('Error viewing bookings. Check console.');
            }
        }
        
        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            initializeDates();
            getTourFromURL();
            
            // Attach form submit handler
            document.getElementById('bookingForm').addEventListener('submit', handleFormSubmit);
            
            // Check for existing bookings
            const existingBookings = JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY) || '[]');
            if (existingBookings.length > 0) {
                console.log(`Found ${existingBookings.length} existing bookings.`);
            }
        });
    </script>
</body>
</html>
